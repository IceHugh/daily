<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主渐变 - 紫罗兰到蓝 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    
    <!-- 发光效果 -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:0" />
    </radialGradient>
    
    <!-- 文字渐变 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- 背景发光层 -->
  <circle cx="200" cy="200" r="180" fill="url(#glowGradient)" opacity="0.3"/>
  
  <!-- 主圆形背景 -->
  <circle cx="200" cy="200" r="170" fill="url(#mainGradient)" stroke="#c4b5fd" stroke-width="3"/>
  
  <!-- 六边形网格 - 代表 Web3/区块链 -->
  <g stroke="#c4b5fd" stroke-width="2" fill="none" opacity="0.4">
    <polygon points="200,80 230,95 230,125 200,140 170,125 170,95"/>
    <polygon points="200,260 230,275 230,305 200,320 170,305 170,275"/>
  </g>
  
  <!-- 连接的节点 - 代表 AI/神经网络 -->
  <g fill="#c4b5fd" opacity="0.7">
    <circle cx="120" cy="150" r="6"/>
    <circle cx="280" cy="150" r="6"/>
    <circle cx="120" cy="250" r="6"/>
    <circle cx="280" cy="250" r="6"/>
  </g>
  
  <!-- 连接线 -->
  <g stroke="#c4b5fd" stroke-width="1.5" fill="none" opacity="0.5">
    <line x1="120" y1="150" x2="200" y2="200"/>
    <line x1="280" y1="150" x2="200" y2="200"/>
    <line x1="120" y1="250" x2="200" y2="200"/>
    <line x1="280" y1="250" x2="200" y2="200"/>
  </g>
  
  <!-- 0x 文字 -->
  <text x="200" y="195" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="url(#textGradient)" text-anchor="middle" opacity="0.95">0x</text>
  
  <!-- fig 文字 -->
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" text-anchor="middle" style="letter-spacing: 2px;">fig</text>
  
  <!-- 装饰性圆环 -->
  <circle cx="200" cy="200" r="150" stroke="#c4b5fd" stroke-width="1" fill="none" opacity="0.3" stroke-dasharray="10 5"/>
  
  <!-- 四个角落的装饰点 -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="200" cy="50" r="4"/>
    <circle cx="200" cy="350" r="4"/>
    <circle cx="50" cy="200" r="4"/>
    <circle cx="350" cy="200" r="4"/>
  </g>
</svg>
